name: Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Clean up any orphaned resources
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        shell: bash
        run: |
          set +e
          aws s3 rb s3://ethandeister-tfstate --force
          aws dynamodb delete-table --table-name terraform-locks
          aws budgets delete-budget --account-id $ACCOUNT_ID --budget-name monthly-cap
          aws iam delete-policy --policy-arn arn:aws:iam::${ACCOUNT_ID}:policy/budget-deny-all
          INLINE=$(aws iam list-role-policies --role-name budget-action-role --query 'PolicyNames[0]' --output text 2>/dev/null)
          if [ -n "$INLINE" ] && [ "$INLINE" != "None" ]; then
            aws iam delete-role-policy --role-name budget-action-role --policy-name $INLINE
          fi
          aws iam delete-role --role-name budget-action-role
          aws iam detach-role-policy --role-name shared-infra-deploy --policy-arn arn:aws:iam::aws:policy/AdministratorAccess
          aws iam delete-role --role-name shared-infra-deploy
          aws iam delete-open-id-connect-provider --open-id-connect-provider-arn arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com
          aws logs delete-log-group --log-group-name /shared-infra
          for arn in $(aws acm list-certificates --region us-west-2 --query "CertificateSummaryList[?DomainName=='*.ethandeister.com'].CertificateArn" --output text); do
            aws acm delete-certificate --certificate-arn $arn
          done
          for record in $(aws route53 list-resource-record-sets --hosted-zone-id Z03972301J6XXRN7TN53X --query "ResourceRecordSets[?Type=='CNAME']" --output json | jq -c '.[]'); do
            name=$(echo $record | jq -r '.Name')
            value=$(echo $record | jq -r '.ResourceRecords[0].Value')
            aws route53 change-resource-record-sets \
              --hosted-zone-id Z03972301J6XXRN7TN53X \
              --change-batch "{\"Changes\":[{\"Action\":\"DELETE\",\"ResourceRecordSet\":{\"Name\":\"$name\",\"Type\":\"CNAME\",\"TTL\":60,\"ResourceRecords\":[{\"Value\":\"$value\"}]}}]}"
          done
          sleep 15
          exit 0

      - uses: hashicorp/setup-terraform@v3

      - name: Init (local backend)
        run: terraform init -backend=false

      - name: Apply state backend
        run: terraform apply -auto-approve -target=module.state_backend -var="alert_email=${{ secrets.TF_VAR_alert_email }}"

      - name: Migrate state to S3
        run: terraform init -migrate-state -force-copy
        env:
          TF_CLI_ARGS_init: "-input=false"

      - name: Apply remaining resources
        run: terraform apply -auto-approve -var="alert_email=${{ secrets.TF_VAR_alert_email }}"
